<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <foreignObject width="100%" height="100%">
    <html xmlns="http://www.w3.org/1999/xhtml">
      <head>
        <meta charset="UTF-8">
        <title>Login</title>
        <style>
          body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0f1a 0%, #0d1117 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
          }
          .login-container {
            background: rgba(18, 22, 30, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
          }
          h1 { color: white; margin-bottom: 20px; }
          #g_id_onload, .g_id_signin { display: flex; justify-content: center; margin: 10px 0; }
        </style>
      </head>
      <body>
        <div class="login-container">
          <h1>🎮 Unblocked Hub</h1>
          <div id="g_id_onload"
               data-client_id="124658869788-55e9cll1e7d9ge3v1g8lgejhfr61teur.apps.googleusercontent.com"
               data-callback="handleLogin"
               data-auto_prompt="false">
          </div>
          <div class="g_id_signin"
               data-type="standard"
               data-shape="rectangular"
               data-theme="filled_black"
               data-text="signin_with"
               data-size="large"
               data-logo_alignment="left">
          </div>
        </div>
        <script src="https://accounts.google.com/gsi/client" async></script>
        <script>
          window.handleLogin = function(response) {
            console.log("Login response:", response);
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            alert("Welkom " + payload.email + "!");
            // Hier kun je doorsturen naar je games hub
            // window.location.href = "https://jouw-game-hub-url.nl";
          };
        </script>
      </body>
    </html>
  </foreignObject>
</svg>
