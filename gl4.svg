<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <foreignObject width="100%" height="100%">
    <html xmlns="http://www.w3.org/1999/xhtml">
      <head>
        <title>Login</title>
        <style>
          body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0f1a 0%, #0d1117 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
          }
          .login-container {
            background: rgba(18, 22, 30, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
          }
          h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #a0a0c0 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
          }
          .sub {
            color: #8b8f9e;
            font-size: 15px;
            margin-bottom: 36px;
          }
          #g_id_onload, .g_id_signin {
            display: flex;
            justify-content: center;
            margin: 10px 0;
          }
          .info {
            margin-top: 32px;
            padding: 12px;
            background: rgba(0, 255, 100, 0.08);
            border-radius: 20px;
            font-size: 12px;
            color: #6ce69c;
          }
        </style>
      </head>
      <body>
        <div class="login-container">
          <h1>🎮 ARCADE</h1>
          <div class="sub">300+ unblocked games • instant play</div>
          
          <div id="g_id_onload"
               data-client_id="124658869788-55e9cll1e7d9ge3v1g8lgejhfr61teur.apps.googleusercontent.com"
               data-callback="handleLogin"
               data-auto_prompt="false">
          </div>
          <div class="g_id_signin"
               data-type="standard"
               data-shape="rectangular"
               data-theme="filled_black"
               data-text="signin_with"
               data-size="large"
               data-logo_alignment="left">
          </div>
          
          <div class="info">
            ✅ Login with your SCHOOL Google account
          </div>
        </div>
        
        <script src="https://accounts.google.com/gsi/client"></script>
        <script>
          window.handleLogin = function(response) {
            var payload = JSON.parse(atob(response.credential.split('.')[1]));
            var email = payload.email;
            var name = payload.name || email.split('@')[0];
            
            alert("Welcome " + name + "!\nEmail: " + email);
            
            // Save user info
            localStorage.setItem('user_email', email);
            localStorage.setItem('user_name', name);
            
            // Redirect to your game hub (change this URL!)
            // window.location.href = "https://your-game-hub-url.com";
          };
        </script>
      </body>
    </html>
  </foreignObject>
</svg>
